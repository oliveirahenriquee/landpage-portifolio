<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | Barbearia</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="dashboard.css">
    <style>
        .toast-container { position: fixed; top: 20px; right: 20px; z-index: 1000; }
        .toast { background: #2ecc71; color: white; padding: 15px; border-radius: 8px; margin-bottom: 10px; transition: 0.5s; }
        .toast.hide { opacity: 0; transform: translateX(100%); }
        .btn-atualizar { background: #3498db !important; color: white !important; }
        .btn-atualizar:hover { background: #2980b9 !important; }
    </style>
</head>
<body>

    <aside id="sidebar" class="sidebar">
        <div class="sidebar-header">
            <div class="logo-container">
                <img src="foto-logo.webp" alt="Logo" class="logo">
            </div>
            <h2 id="sidebar-title">Menu</h2>
        </div>
        <nav>
            <ul>
                <li onclick="location.reload()"><span>Dashboard</span></li>
                <li><a href="index.html" style="text-decoration:none; color:inherit;"><span>Lançamentos</span></a></li>
                <li class="item-sair"><span>Sair</span></li>
            </ul>
        </nav>
    </aside>

    <main class="main-content" id="main">
        <header class="header">
            <h1>Resumo Financeiro</h1>
            <div class="header-controls">
                <button id="btnAtualizar" class="btn-acao btn-atualizar">Atualizar Dados</button>
                <button id="toggleDark" class="btn-acao">Modo Noturno</button>
                <button id="toggleSidebar" class="btn-acao">☰ Menu</button>
            </div>
        </header>

        <section class="grid-cards">
            <div class="card">
                <h3>Total Geral</h3>
                <p id="gastos">R$ 0,00</p>
            </div>
            <div class="card">
                <h3>Investimentos</h3>
                <p id="investimentos">R$ 0,00</p>
            </div>
        </section>

        <section class="grid-charts">
            <div class="chart-container" style="height: 300px;">
                <canvas id="pieChart"></canvas>
            </div>
            <div class="chart-container" style="height: 300px;">
                <canvas id="barChart"></canvas>
            </div>
        </section>
    </main>

    <div id="toast-container" class="toast-container"></div>
    <script src="dashboard.js"></script>
</body>
</html>
